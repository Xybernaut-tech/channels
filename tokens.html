
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Binge Token Validator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Segoe UI", system-ui, sans-serif;
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0f172a,#1e3a8a,#9333ea);
background-size:400% 400%;
animation:bgmove 12s ease infinite;
padding:20px;
color:white;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.card{

width:100%;
max-width:420px;
padding:32px;
border-radius:18px;

background:rgba(255,255,255,0.08);
backdrop-filter:blur(16px);
-webkit-backdrop-filter:blur(16px);

border:1px solid rgba(255,255,255,0.18);
box-shadow:0 10px 35px rgba(0,0,0,0.35);
}

h1{
font-size:24px;
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:13px;
border-radius:10px;
border:none;
outline:none;
margin-bottom:12px;

background:rgba(255,255,255,0.12);
color:white;
font-size:14px;
}

input::placeholder{
color:#cbd5f5;
}

button{
width:100%;
padding:13px;
border:none;
border-radius:10px;

background:linear-gradient(135deg,#38bdf8,#6366f1);
color:white;
font-weight:600;
font-size:15px;

cursor:pointer;
transition:0.25s;
}

button:hover{
transform:scale(1.03);
}

.result{
margin-top:18px;
line-height:1.7;
font-size:14px;
word-wrap:break-word;
}

.status-active{
color:#4ade80;
font-weight:600;
}

.status-expired{
color:#f87171;
font-weight:600;
}

.footer{
margin-top:18px;
font-size:13px;
text-align:center;
opacity:0.9;
}

.footer a{
color:#7dd3fc;
text-decoration:none;
font-weight:600;
}

.footer a:hover{
text-decoration:underline;
}

@media (max-width:480px){

.card{
padding:24px;
}

h1{
font-size:20px;
}

button,input{
font-size:14px;
}

}

</style>
</head>

<body>

<div class="card">

<h1>🔑 Token Validator</h1>

<input id="tokenInput" placeholder="Enter token">

<button onclick="validateToken()">Validate Token</button>

<div id="result" class="result"></div>

<div class="footer">
Generated by <a href="https://t.me/BingeTokensBot" target="_blank">Binge Tokens Bot</a>
</div>

</div>

<script>

const TOKEN_URL="https://telegram-tokens-bot.pages.dev/tokens.json";

function utcToIST(time){
const date=new Date(time+"Z");
return date.toLocaleString("en-IN",{
timeZone:"Asia/Kolkata",
dateStyle:"medium",
timeStyle:"medium"
});
}

async function validateToken(){

const token=document.getElementById("tokenInput").value.trim();
const result=document.getElementById("result");

if(!token){
result.innerHTML="⚠️ Please enter a token.";
return;
}

result.innerHTML="Checking token...";

try{

const res=await fetch(TOKEN_URL);
const data=await res.json();

if(!data[token]){
result.innerHTML="❌ Invalid Token";
return;
}

const t=data[token];

const createdIST=utcToIST(t.created_at);
const expiryIST=utcToIST(t.expires_at);

const expired = new Date(t.expires_at+"Z") < new Date();

let statusHTML="";

if(t.active && !expired){
statusHTML='<span class="status-active">Active</span>';
}else{
statusHTML='<span class="status-expired">Expired</span>';
}

result.innerHTML=`
<b>Created By:</b> ${t.username}<br>
<b>Status:</b> ${statusHTML}<br>
<b>Created At:</b> ${createdIST} (IST)<br>
<b>Expires At:</b> ${expiryIST} (IST)
`;

}catch(err){
result.innerHTML="❌ Failed to fetch tokens.";
}

}

/* Enter key support */

document.getElementById("tokenInput")
.addEventListener("keypress",function(e){

if(e.key==="Enter"){
validateToken();
}

});

</script>

</body>
</html>
