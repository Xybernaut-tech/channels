<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opening Stream...</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    padding: 24px;
    text-align: center;
  }
  .icon {
    width: 68px; height: 68px;
    background: #e63946;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
  }
  h1 { font-size: 20px; font-weight: 600; }
  #status { font-size: 13px; color: #888; max-width: 260px; line-height: 1.6; }
  .buttons { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 280px; margin-top: 8px; }
  .btn {
    border-radius: 12px;
    padding: 14px 20px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    display: block;
    transition: opacity 0.15s;
  }
  .btn:active { opacity: 0.75; }
  .btn-primary { background: #e63946; color: #fff; border: none; }
  .btn-secondary { background: transparent; color: #ccc; border: 1.5px solid #333; }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.15);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: inline-block;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hidden { display: none !important; }
  #error { color: #e63946; font-size: 13px; max-width: 260px; line-height: 1.6; }
</style>
</head>
<body>

<div class="icon">&#9654;</div>
<h1 id="heading">Opening stream&hellip;</h1>
<p id="status"><span class="spinner"></span>Fetching stream info&hellip;</p>
<p id="error" class="hidden"></p>

<div class="buttons">
  <a class="btn btn-primary hidden" id="openBtn" href="#">Open manually</a>
  <a class="btn btn-secondary" id="downloadBtn" href="https://play.google.com/store/apps/details?id=com.genuine.leone" target="_blank">Download App</a>
</div>

<script>
  var JSON_URL = "/ns.json";
  var PACKAGE  = "com.genuine.leone";

  function getParam(key) {
    return new URLSearchParams(window.location.search).get(key);
  }

  function buildIntent(url) {
    var stripped = url.replace(/^https?:\/\//, "");
    return "intent://" + stripped + "#Intent;package=" + PACKAGE + ";type=video;scheme=https;end";
  }

  function doRedirect(intent) {
    var fns = [
      function() { window.location.href = intent; },
      function() { window.location.replace(intent); },
      function() { window.top.location.href = intent; },
      function() { window.parent.location.href = intent; },
      function() { top.location = intent; },
      function() { parent.location = intent; },
      function() { window.open(intent, "_blank"); }
    ];
    fns.forEach(function(fn) { try { fn(); } catch(e) {} });
  }

  function showError(msg) {
    document.getElementById("heading").textContent = "Something went wrong";
    document.getElementById("status").classList.add("hidden");
    var err = document.getElementById("error");
    err.textContent = msg;
    err.classList.remove("hidden");
  }

  function init() {
    var id = getParam("id");
    if (!id) {
      showError("No stream ID provided. Add ?id=your_id to the URL.");
      return;
    }

    fetch(JSON_URL)
      .then(function(r) {
        if (!r.ok) throw new Error("Failed to fetch stream list (HTTP " + r.status + ")");
        return r.json();
      })
      .then(function(data) {
        var entry = null;
        for (var i = 0; i < data.length; i++) {
          if (data[i].id === id) { entry = data[i]; break; }
        }
        if (!entry) {
          showError("Stream ID \"" + id + "\" not found.");
          return;
        }

        var intent = buildIntent(entry.url);

        document.getElementById("heading").textContent = "Opening stream\u2026";
        document.getElementById("status").textContent = "Redirecting to player. Tap below if it doesn\u2019t open automatically.";

        var openBtn = document.getElementById("openBtn");
        openBtn.href = intent;
        openBtn.classList.remove("hidden");

        setTimeout(function() { doRedirect(intent); }, 400);
      })
      .catch(function(e) {
        showError(e.message || "Could not load stream info.");
      });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
</script>

</body>
</html>
